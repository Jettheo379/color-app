<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>いろあつめ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<h1>いろあつめ</h1>

<div class="color-panel">
  <div class="color-grid" id="colorGrid"></div>
</div>

<div id="meaning"></div>

<div class="input-area">
  <input type="text" id="memoInput" placeholder="今日の観測を書く">
  <button id="save-button">しまう</button>
</div>

<button id="showMonth">月まとめを見る</button>
<a class="about-link" href="about.html">このアプリについて</a>

<div id="box"></div>

<div id="modal" style="display:none;">
  <div class="modal-box">
    <div class="month-nav">
      <button id="prevMonth">前月</button>
      <button id="currentMonth">今月</button>
    </div>

    <div id="monthContent"></div>
    <button id="closeModal">閉じる</button>
  </div>
</div>



<script>
const grid = document.getElementById('colorGrid');
const meaningDiv = document.getElementById('meaning');
const memoInput = document.getElementById('memoInput');
const storeBtn = document.getElementById('save-button');
const box = document.getElementById('box');
const showMonth = document.getElementById('showMonth');
const modal = document.getElementById('modal');
const monthContent = document.getElementById('monthContent');
const closeModal = document.getElementById('closeModal');
const prevMonth = document.getElementById('prevMonth');
const currentMonth = document.getElementById('currentMonth');

let currentViewDate = new Date();

let observations = [];

try {
  const savedData = localStorage.getItem("observations");
  if (savedData) {
    observations = JSON.parse(savedData);
  }
} catch (e) {
  observations = [];
}

let selectedColor = null;

const colors = [
  { color:'#dc143c', meaning:'情熱 / 行動力 / 炎' },
  { color:'#0000ff', meaning:'コミュニケーション / 信頼 / 声' },
  { color:'#008000', meaning:'調和 / 安心 / 森' },
  { color:'#ffdc00', meaning:'希望 / 好奇心 / 光' },
  { color:'#ffffff', meaning:'真実 / リセット / 余白' },
  { color:'#000000', meaning:'意志 / 秘密 / 遮断' },
  { color:'#8a2be2', meaning:'個性 / 神秘 / プライド' },
  { color:'#003f8e', meaning:'洞察 / 精神力 / ストイック' },
  { color:'#7cfc00', meaning:'成長 / 柔軟 / 芽' },
  { color:'#00bfff', meaning:'変化 / 解放 / 川' },
  { color:'#8b4513', meaning:'安定 / 包容力 / 大地' },
  { color:'#ff8c00', meaning:'おおらか / 社交性 / 食欲' },
  { color:'#ffc0cb', meaning:'愛情 / 共感 / 優しさ' },
  { color:'#eedcb3', meaning:'穏やか / 寛容 / 素肌' },
  { color:'#a9a9a9', meaning:'中立 / 保留 / 都会' },
  { color:'#009b9f', meaning:'自由 / 独立 / 自己表現' }
];

function shuffleArray(array) {
  const result = [...array];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}
function isLightColor(hex) {
  const c = hex.replace('#', '');
  const r = parseInt(c.substring(0, 2), 16);
  const g = parseInt(c.substring(2, 4), 16);
  const b = parseInt(c.substring(4, 6), 16);
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness > 170;
}

function getTextColor(bgColor) {
  return isLightColor(bgColor) ? '#000' : '#fff';
}

function formatDayLabel(dateString) {
  const d = new Date(dateString);
  return (
    d.getFullYear() + '/' +
    String(d.getMonth() + 1).padStart(2, '0') + '/' +
    String(d.getDate()).padStart(2, '0')
  );
}

function formatTime(dateString) {
  const d = new Date(dateString);
  return (
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0')
  );
}

function getMonthData(targetDate) {
  const targetYear = targetDate.getFullYear();
  const targetMonth = targetDate.getMonth();

  return observations
    .filter(o => {
      const d = new Date(o.date);
      return d.getFullYear() === targetYear && d.getMonth() === targetMonth;
    })
    .sort((a, b) => new Date(b.date) - new Date(a.date));
}
function renderMonthSummary(targetDate) {
  monthContent.innerHTML = '';

  const monthData = getMonthData(targetDate);

  const title = document.createElement('h2');
  title.className = 'month-title';
  title.textContent = `${targetDate.getFullYear()}年${targetDate.getMonth() + 1}月のまとめ`;
  monthContent.appendChild(title);

  if (monthData.length === 0) {
    const empty = document.createElement('p');
    empty.className = 'month-empty';
    empty.textContent = 'この月の記録はまだありません。';
    monthContent.appendChild(empty);
    return;
  }

  const total = document.createElement('p');
  total.className = 'month-total';
  total.textContent = `記録数：${monthData.length}件`;
  monthContent.appendChild(total);

  const summaryTitle = document.createElement('h3');
  summaryTitle.className = 'month-section-title';
  summaryTitle.textContent = '色の気配';
  monthContent.appendChild(summaryTitle);

  const colorCounts = countColors(monthData);
  const chartArea = document.createElement('div');
  chartArea.className = 'chart-area';

  chartArea.appendChild(createDonutChart(colorCounts, monthData.length));
  chartArea.appendChild(createLegend(colorCounts));
  monthContent.appendChild(chartArea);

  const logTitle = document.createElement('h3');
  logTitle.className = 'month-section-title';
  logTitle.textContent = '記録';
  monthContent.appendChild(logTitle);

  const grouped = groupByDay(monthData);

  Object.keys(grouped).forEach(day => {
    const dayBlock = document.createElement('div');
    dayBlock.className = 'day-block';

    const dayTitle = document.createElement('h4');
    dayTitle.className = 'day-title';
    dayTitle.textContent = day;
    dayBlock.appendChild(dayTitle);

    grouped[day].forEach(item => {
      const entry = document.createElement('div');
      entry.className = 'month-entry';
      entry.style.backgroundColor = item.color;
      entry.style.color = getTextColor(item.color);

      const time = document.createElement('div');
      time.className = 'entry-time';
      time.textContent = formatTime(item.date);

      const memo = document.createElement('div');
      memo.className = 'entry-text';
      memo.textContent = item.text;

      const meaning = document.createElement('div');
      meaning.className = 'entry-meaning';
      meaning.textContent = item.meaning;

      entry.appendChild(time);
      entry.appendChild(memo);
      entry.appendChild(meaning);
      dayBlock.appendChild(entry);
    });

    monthContent.appendChild(dayBlock);
  });
}

function groupByDay(data) {
  const grouped = {};

  data.forEach(item => {
    const key = formatDayLabel(item.date);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });

  return grouped;
}

function countColors(data) {
  const counts = {};

  data.forEach(item => {
    if (!counts[item.color]) {
      counts[item.color] = {
        count: 0,
        meaning: item.meaning
      };
    }
    counts[item.color].count += 1;
  });

  return Object.entries(counts).sort((a, b) => b[1].count - a[1].count);
}

function createDonutChart(colorCounts, totalCount) {
  const wrap = document.createElement('div');
  wrap.className = 'donut-wrap';

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 200 200');
  svg.setAttribute('class', 'donut-chart');

  const radius = 70;
  const circumference = 2 * Math.PI * radius;
  let offset = 0;

  colorCounts.forEach(([color, info]) => {
    const value = info.count;
    const length = (value / totalCount) * circumference;

    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', '100');
    circle.setAttribute('cy', '100');
    circle.setAttribute('r', String(radius));
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width', '24');
    circle.setAttribute('stroke-dasharray', `${length} ${circumference - length}`);
    circle.setAttribute('stroke-dashoffset', String(-offset));
    circle.setAttribute('transform', 'rotate(-90 100 100)');
    svg.appendChild(circle);

    offset += length;
  });

  const center = document.createElement('div');
  center.className = 'donut-center';
  center.innerHTML = `<span class="donut-total">${totalCount}</span><span class="donut-label">件</span>`;

  wrap.appendChild(svg);
  wrap.appendChild(center);

  return wrap;
}

function createLegend(colorCounts) {
  const legend = document.createElement('div');
  legend.className = 'chart-legend';

  colorCounts.forEach(([color, info]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';

    const swatch = document.createElement('span');
    swatch.className = 'legend-swatch';
    swatch.style.backgroundColor = color;
    if (isLightColor(color)) {
      swatch.style.border = '1px solid #ccc';
    }

    const text = document.createElement('span');
    text.className = 'legend-text';
    text.textContent = `${info.count}回`;

    item.appendChild(swatch);
    item.appendChild(text);
    legend.appendChild(item);
  });

  return legend;
}

// 色パネル生成
const shuffledColors = shuffleArray(colors);
shuffledColors.forEach(item => {
  const circle = document.createElement('div');
  circle.className = 'color-circle';
  circle.style.backgroundColor = item.color;

  if (isLightColor(item.color)) {
    circle.style.border = '1px solid #ccc';
  }

  circle.addEventListener('click', () => {
    selectedColor = item.color;
    document.body.style.backgroundColor = selectedColor;
    meaningDiv.textContent = item.meaning;
    meaningDiv.classList.add('show');
  });

  grid.appendChild(circle);
});

// 保存
storeBtn.addEventListener('click', () => {
  if (memoInput.value.trim() !== '' && selectedColor) {
    const now = new Date();

    const observation = {
      color: selectedColor,
      meaning: meaningDiv.textContent,
      text: memoInput.value.trim(),
      date: now.toISOString()
    };

    observations.push(observation);
    localStorage.setItem("observations", JSON.stringify(observations));

    const storedDiv = document.createElement('div');
    storedDiv.className = 'stored';
    storedDiv.style.backgroundColor = selectedColor;
    storedDiv.style.color = getTextColor(selectedColor);
    storedDiv.textContent = memoInput.value.trim();

    box.innerHTML = '';
    box.appendChild(storedDiv);

    memoInput.value = '';
    meaningDiv.textContent = '';
    meaningDiv.classList.remove('show');
    selectedColor = null;
    document.body.style.backgroundColor = '';
  }
});

// 月まとめ
showMonth.addEventListener('click', () => {
  currentViewDate = new Date();
  renderMonthSummary(currentViewDate);
  modal.style.display = 'flex';
});

// 閉じる
closeModal.addEventListener('click', () => {
  modal.style.display = 'none';
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.style.display = 'none';
  }
});

prevMonth.addEventListener('click', () => {
  currentViewDate = new Date(
    currentViewDate.getFullYear(),
    currentViewDate.getMonth() - 1,
    1
  );
  renderMonthSummary(currentViewDate);
});

currentMonth.addEventListener('click', () => {
  currentViewDate = new Date();
  renderMonthSummary(currentViewDate);
});


</script>
</div>
</body>
</html>
